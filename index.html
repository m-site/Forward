<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://t.me/MEDQUIZ2026/200">
    <title>جاري التحويل للتليجرام...</title>
    <style>
        :root {
            --bg: #0f172a;
            --primary: #38bdf8;
            --text: #f8fafc;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(56, 189, 248, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: var(--text); font-size: 1.2rem; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }
        
        .manual-btn {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }
        .manual-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>جاري تحويلك إلى قناة MedQuiz... ✈️</h2>
    <p>إذا لم يتم تحويلك تلقائياً خلال ثوانٍ، اضغط على الزر بالأسفل.</p>
    
    <a href="https://t.me/MEDQUIZ2026/200" class="manual-btn">انتقل إلى التليجرام الآن</a>

    <script>
        setTimeout(function() {
            window.location.href = "https://t.me/MEDQUIZ2026/200";
        }, 100); // تحويل بعد 100 ملي ثانية
    </script>

</body>
</html>
